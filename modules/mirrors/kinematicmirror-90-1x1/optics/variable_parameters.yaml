module_uuid: "c3d4e5f6-a7b8-9012-cdef-345678901234"

parameters:
  - name: rx_offset_deg
    description: "Pitch tilt - deflects return beam vertically"
    optiland_variable:
      type: rx
      surface_number: 1
    default: 0.0
    min: -4.0
    max: 4.0
    step: 0.01
    unit: deg
    mechanical_constraint: "Mechanical limit of the kinematic mount micrometer screw."

  - name: ry_offset_deg
    description: "Yaw tilt - deflects return beam horizontally"
    optiland_variable:
      type: ry
      surface_number: 1
    default: 0.0
    min: -4.0
    max: 4.0
    step: 0.01
    unit: deg
    mechanical_constraint: "Mechanical limit of the kinematic mount micrometer screw."

