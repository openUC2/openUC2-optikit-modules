module_uuid: "b2c3d4e5-f6a7-8901-bcde-f23456789012"

parameters:
  - name: rx_offset_deg
    description: "Pitch tilt about horizontal axis (front micrometer)"
    optiland_variable:
      type: rx
      surface_number: 1
    default: 0.0
    min: -4.0
    max: 4.0
    step: 0.01
    unit: deg
    mechanical_constraint: "Mechanical limit of the kinematic mount micrometer screw."

  - name: ry_offset_deg
    description: "Yaw tilt about vertical axis (top micrometer)"
    optiland_variable:
      type: ry
      surface_number: 1
    default: 0.0
    min: -4.0
    max: 4.0
    step: 0.01
    unit: deg
    mechanical_constraint: "Mechanical limit of the kinematic mount micrometer screw."

