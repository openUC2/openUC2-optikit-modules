# =============================================================================
# printing.yaml — 3D printing settings for laser-635nm insert
# =============================================================================

module_uuid: "e5f6a7b8-c9d0-1234-ef01-567890123456"

parts_to_print:
  - name: "CPS laser holder"
    stl_file: "cad/exports/insert-laser-cps.stl"
    quantity: 1

    recommended_settings:
      printer_type: FDM
      material: PLA
      nozzle_diameter_mm: 0.4
      layer_height_mm: 0.2
      infill_percent: 80
      infill_pattern: grid
      wall_count: 4
      top_layers: 5
      bottom_layers: 5
      supports: false
      orientation: "Standing (optical axis vertical)"
      print_time_min: 40
      material_usage_g: 7.2

    alternative_settings:
      - name: "High accuracy (SLA)"
        printer_type: SLA
        material: "Standard resin (black)"
        layer_height_mm: 0.05
        notes: "Better dimensional accuracy for tight mechanical fits"

    critical_dimensions:
      - feature: "CPS laser cylindrical bore"
        nominal_mm: 11.05
        tolerance_mm: 0.05
        notes: "Tight press-fit on 11 mm CPS body - verify after printing"
      - feature: "Power lead pass-through"
        nominal_mm: 4.0
        tolerance_mm: 0.3
      - feature: "Outer dimensions"
        nominal_mm: 47.0
        tolerance_mm: 0.2

    post_processing:
      - "Remove any stringing or supports"
      - "Test-fit external part before final assembly"
      - "Lightly file sliding surfaces"
